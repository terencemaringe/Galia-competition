name: Galia Competitive Newsletter (MVP)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # tous les jours à 06:00 UTC (~07:00 Paris)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests pyyaml beautifulsoup4 feedparser

      - name: Run
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python Galia_competition.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Galia_competition update-output
          path: output/
